name: Windows Desktop Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'core/**'
      - 'scripts/**'
      - '.github/workflows/windows-desktop-preview.yml'
      - 'tests/**'
      - 'pyproject.toml'
      - 'package.json'

jobs:
  windows-preview:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest pyinstaller

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Run Python tests
        run: python -m pytest -q

      - name: Build web UI
        run: npm --prefix apps/web run build

      - name: Build API sidecar
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build_api_sidecar_windows.ps1

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop install --package-lock=false

      - name: Check desktop preview skeleton
        run: npm --prefix apps/desktop run check:skeleton

      - name: Build Tauri unsigned preview
        run: npm --prefix apps/desktop run tauri:build:preview

      - name: Stage preview artifact
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_desktop_preview_windows.ps1
          powershell -ExecutionPolicy Bypass -File scripts/smoke_p14c_preview_windows.ps1

      - name: Upload Windows desktop preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: scbkr-windows-desktop-preview
          path: dist/scbkr-windows-desktop-preview
